---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
nameSuffix: -worker-init

components:
  - ../../../components/alerts

patches:
- patch: |-
    - op: replace
      path: /spec/eventMetadata/flakeOutput
      value: github:TraceMachina/nativelink#nativelink-worker-init
    - op: replace
      path: /spec/eventMetadata/configMapName
      value: nativelink-worker-init
  target:
    kind: Alert
    name: nativelink-alert
