---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: tekton-operator
  namespace: flux-system
spec:
  interval: 2m
  path: "./kubernetes/vendor/tekton-operator"
  prune: true
  force: true
  retryInterval: 20s
  targetNamespace: tekton-operator
  wait: true
  sourceRef:
    kind: GitRepository
    name: nativelink
    namespace: flux-system
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: tekton-config
  namespace: flux-system
spec:
  interval: 2m
  path: "./kubernetes/resources/tekton-config"
  prune: true
  force: true
  retryInterval: 20s
  wait: true
  sourceRef:
    kind: GitRepository
    name: nativelink
    namespace: flux-system
  dependsOn:
    - name: tekton-operator
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: nativelink-tekton-resources
  namespace: flux-system
spec:
  interval: 2m
  path: "./kubernetes/resources/tekton"
  prune: true
  force: true
  retryInterval: 20s
  targetNamespace: default
  wait: true
  sourceRef:
    kind: GitRepository
    name: nativelink
    namespace: flux-system
  dependsOn:
    - name: tekton-config
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: provider
  namespace: flux-system
spec:
  interval: 2m
  path: "./kubernetes/resources/provider"
  prune: true
  force: true
  retryInterval: 20s
  targetNamespace: default
  wait: true
  sourceRef:
    kind: GitRepository
    name: nativelink
    namespace: flux-system
  dependsOn:
    - name: nativelink-tekton-resources
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cert-manager
  namespace: flux-system
spec:
  interval: 2m
  path: "./kubernetes/resources/cert-manager"
  prune: true
  force: true
  retryInterval: 20s
  # Don't set targetNamespace for this one as the cert-manager kustomization
  # needs to create a cert-manager namespace. The flux resources will live in
  # the flux-system namespace.
  wait: true
  sourceRef:
    kind: GitRepository
    name: nativelink
    namespace: flux-system
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: opentelemetry-operator
  namespace: flux-system
spec:
  interval: 2m
  path: "./kubernetes/vendor/opentelemetry-operator"
  prune: true
  force: true
  retryInterval: 20s
  targetNamespace: opentelemetry-operator
  wait: true
  sourceRef:
    kind: GitRepository
    name: nativelink
    namespace: flux-system
  dependsOn:
    - name: cert-manager
---
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: OCIRepository
metadata:
  name: grafana-operator
  namespace: flux-system
spec:
  interval: 5m0s
  url: oci://ghcr.io/grafana/kustomize/grafana-operator
  ref:
    semver: "*"
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: grafana-operator
  namespace: flux-system
spec:
  interval: 2m
  path: "./overlays/cluster_scoped"
  prune: true
  force: true
  retryInterval: 20s
  targetNamespace: grafana-operator
  wait: true
  sourceRef:
    kind: OCIRepository
    name: grafana-operator
    namespace: flux-system
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: grafana
  namespace: flux-system
spec:
  interval: 2m
  path: "./kubernetes/resources/grafana"
  prune: true
  force: true
  retryInterval: 20s
  targetNamespace: flux-system
  wait: true
  sourceRef:
    kind: GitRepository
    name: nativelink
    namespace: flux-system
  dependsOn:
    - name: grafana-operator
